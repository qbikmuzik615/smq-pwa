<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#000000"/>
<title>SMQ</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<canvas id="fluidCanvas"></canvas>
<div id="splashUi">
  <h1 id="splashTitle">SMQ</h1>
  <p id="splashHint">Touch to begin</p>
</div>
<div id="app" class="hidden">
  <header>
    <span id="stageBadge">Stage 1</span>
    <span id="scoreBadge">0</span>
    <button id="btnSettings" aria-label="Settings">⚙</button>
  </header>
  <main id="questionArea">
    <div id="questionCard">
      <p id="questionText"></p>
      <div id="answerButtons"></div>
    </div>
  </main>
</div>
<aside id="settingsPanel" class="hidden">
  <h3>Settings</h3>
  <button id="btnCloseSettings">✕</button>
  <section>
    <h4>Game</h4>
    <div class="setting-row"><span>Fast hints</span><button id="tglFastHints" class="toggle"></button></div>
    <div class="setting-row"><span>Sound</span><button id="tglSound" class="toggle on"></button></div>
  </section>
  <section>
    <h4>Fluid</h4>
    <div class="setting-row"><span>Start blank</span><button id="tglStartBlank" class="toggle on"></button></div>
    <div class="setting-row"><span>Bloom glow</span><button id="tglBloom" class="toggle on"></button></div>
    <div class="setting-row"><span>Swirl power</span><input id="rngSwirl" type="range" min="1" max="10" value="6"/></div>
    <div class="setting-row"><span>Rainbow speed</span><input id="rngRainbow" type="range" min="1" max="10" value="5"/></div>
    <div class="setting-row"><span>Visible time</span><input id="rngVisible" type="range" min="0.90" max="0.999" step="0.001" value="0.985"/></div>
    <div class="setting-row"><span>Color rotation</span><input id="rngColorSpeed" type="range" min="0.02" max="0.5" step="0.01" value="0.12"/></div>
    <div class="setting-row"><span>Glow intensity</span><input id="rngBloom" type="range" min="0" max="1.5" step="0.05" value="0.7"/></div>
    <div class="setting-row"><span>Splat radius</span><input id="rngRadius" type="range" min="0.05" max="0.35" step="0.01" value="0.18"/></div>
    <div class="setting-row"><span>Vorticity</span><input id="rngVorticity" type="range" min="0" max="50" step="1" value="22"/></div>
  </section>
</aside>
<script type="module" src="js/app.js"></script>
</body>
</html>
